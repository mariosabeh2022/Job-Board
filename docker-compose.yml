services:
  mysql:
    image: mysql:8
    container_name: mysql_local
    restart: always
    environment:
      MYSQL_DATABASE: laravel_job_board
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mysql_data: